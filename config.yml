backend:
  name: github
  repo: YOUR-GITHUB-USERNAME/msd-site
  branch: main

media_folder: "images"
public_folder: "/images"

collections:
  - name: "settings"
    label: "Site Settings"
    files:

      - name: "general"
        label: "🏠 General Info"
        file: "_data/general.json"
        fields:
          - { label: "Business Name", name: "business_name", widget: "string", default: "Main Street Digital" }
          - { label: "Tagline (under logo in footer)", name: "tagline", widget: "string", default: "Web design and support for small businesses. One person, done right." }
          - { label: "Email Address", name: "email", widget: "string", default: "hello@mainstreetdigital.co" }
          - { label: "Copyright Text", name: "copyright", widget: "string", default: "© 2025 Main Street Digital. All rights reserved." }

      - name: "hero"
        label: "🦸 Hero Section"
        file: "_data/hero.json"
        fields:
          - { label: "Kicker (small text above headline)", name: "kicker", widget: "string", default: "Built for Small Businesses" }
          - { label: "Headline Line 1", name: "h1_line1", widget: "string", default: "Your business deserves a website that works" }
          - { label: "Headline Line 2 (italic accent)", name: "h1_line2", widget: "string", default: "as hard as you do." }
          - { label: "Subheadline", name: "sub", widget: "text", default: "Main Street Digital is a one-person web design shop — honest pricing, clear deliverables, and support that actually shows up." }
          - { label: "Honesty Note", name: "note", widget: "string", default: "No markup. No mystery. No over-promising." }
          - { label: "Primary Button Text", name: "btn1", widget: "string", default: "Get My Free Audit" }
          - { label: "Secondary Button Text", name: "btn2", widget: "string", default: "See Pricing" }

      - name: "honesty"
        label: "👋 Honesty Band"
        file: "_data/honesty.json"
        fields:
          - { label: "Heading", name: "heading", widget: "string", default: "One person. Real tools. No fluff." }
          - { label: "Body Text", name: "body", widget: "text", default: "Main Street Digital is run by one person — me. I'm self-trained, and I use modern AI-assisted tools and proven platforms to deliver professional results without a big agency's overhead or timeline." }

      - name: "pricing"
        label: "💰 Pricing Plans"
        file: "_data/pricing.json"
        fields:
          - label: "Plans"
            name: "plans"
            widget: "list"
            fields:
              - { label: "Plan Name", name: "name", widget: "string" }
              - { label: "Monthly Price (number only, no $)", name: "price_monthly", widget: "number" }
              - { label: "Annual Price (number only, no $)", name: "price_annual", widget: "number" }
              - { label: "Price Unit (e.g. one-time or /month)", name: "unit", widget: "string" }
              - { label: "Short Pitch", name: "pitch", widget: "string" }
              - { label: "Mark as Featured?", name: "featured", widget: "boolean", default: false }
              - label: "Features List"
                name: "features"
                widget: "list"
                field: { label: "Feature", name: "feature", widget: "string" }
              - { label: "Fine Print (italic note at bottom)", name: "fine_print", widget: "string" }
              - { label: "Button Text", name: "btn", widget: "string", default: "Get Started" }

      - name: "consultations"
        label: "📅 Consultations"
        file: "_data/consultations.json"
        fields:
          - { label: "Section Heading", name: "heading", widget: "string", default: "Not sure what you need?" }
          - { label: "Section Subtext", name: "sub", widget: "string", default: "A focused 1-on-1 session where I look at your situation and give you a straight answer." }
          - label: "Session Options"
            name: "options"
            widget: "list"
            fields:
              - { label: "Name", name: "name", widget: "string" }
              - { label: "Price (number only, no $)", name: "price", widget: "number" }
              - { label: "Description", name: "desc", widget: "text" }
              - { label: "Duration / Format (e.g. 30 minutes · Zoom call)", name: "meta", widget: "string" }
              - { label: "Best For (italic note)", name: "best_for", widget: "string" }

      - name: "testimonials"
        label: "⭐ Testimonials"
        file: "_data/testimonials.json"
        fields:
          - label: "Testimonials"
            name: "items"
            widget: "list"
            fields:
              - { label: "Quote (no quotation marks needed)", name: "quote", widget: "text" }
              - { label: "Client Name", name: "name", widget: "string" }
              - { label: "Business Name", name: "business", widget: "string" }
              - { label: "Initials (2 letters for avatar circle)", name: "initials", widget: "string" }

      - name: "faq"
        label: "❓ FAQ"
        file: "_data/faq.json"
        fields:
          - label: "Questions & Answers"
            name: "items"
            widget: "list"
            fields:
              - { label: "Question", name: "q", widget: "string" }
              - { label: "Answer", name: "a", widget: "text" }

      - name: "cta"
        label: "📣 Bottom CTA Section"
        file: "_data/cta.json"
        fields:
          - { label: "Headline", name: "heading", widget: "string", default: "Ready to get your business online — properly?" }
          - { label: "Subtext", name: "sub", widget: "string", default: "Start with the free audit. No commitment, no credit card, no pitch." }
          - { label: "Primary Button Text", name: "btn1", widget: "string", default: "Request Free Audit" }
          - { label: "Secondary Button Text", name: "btn2", widget: "string", default: "Book a Consultation" }

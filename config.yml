backend:
  name: git-gateway
  branch: main

media_folder: "images"
public_folder: "/images"

collections:
  - name: "settings"
    label: "Site Settings"
    files:

      - name: "general"
        label: "🏠 General Info"
        file: "_data/general.json"
        fields:
          - { label: "Business Name", name: "business_name", widget: "string", default: "Main Street Digital" }
          - { label: "Tagline (under logo in footer)", name: "tagline", widget: "string", default: "Web design and support for small businesses. One person, done right." }
          - { label: "Email Address", name: "email", widget: "string", default: "hello@mainstreetdigital.co" }
          - { label: "Copyright Text", name: "copyright", widget: "string", default: "© 2025 Main Street Digital. All rights reserved." }

      - name: "hero"
        label: "🦸 Hero Section"
        file: "_data/hero.json"
        fields:
          - { label: "Kicker (small text above headline)", name: "kicker", widget: "string", default: "Built for Small Businesses" }
          - { label: "Headline Line 1", name: "h1_line1", widget: "string", default: "Your business deserves a website that works" }
          - { label: "Headline Line 2 (italic/accent)", name: "h1_line2", widget: "string", default: "as hard as you do." }
          - { label: "Subheadline", name: "sub", widget: "text", default: "Main Street Digital is a one-person web design shop — honest pricing, clear deliverables, and support that actually shows up. No agency runaround." }
          - { label: "Honesty Note", name: "note", widget: "string", default: "No markup. No mystery. No over-promising." }
          - { label: "Primary Button Text", name: "btn1", widget: "string", default: "Get My Free Audit" }
          - { label: "Secondary Button Text", name: "btn2", widget: "string", default: "See Pricing" }

      - name: "honesty"
        label: "👋 Honesty Band"
        file: "_data/honesty.json"
        fields:
          - { label: "Heading", name: "heading", widget: "string", default: "One person. Real tools. No fluff." }
          - { label: "Body Text", name: "body", widget: "text", default: "Main Street Digital is run by one person — me. I'm self-trained, and I use modern AI-assisted tools and proven platforms to deliver professional results without a big agency's overhead or timeline. I work within a clear scope of what I know. You'll always know what you're getting before anything starts." }

      - name: "services"
        label: "🌐 Services Section"
        file: "_data/services.json"
        fields:
          - { label: "Section Heading", name: "heading", widget: "string", default: "Services built around what small businesses actually need." }
          - { label: "Section Subtext", name: "sub", widget: "string", default: "Everything here is something I can deliver solo with the right tools. No vague scope, no surprises at invoice time." }
          - label: "Services List"
            name: "items"
            widget: "list"
            fields:
              - { label: "Icon (emoji)", name: "icon", widget: "string" }
              - { label: "Title", name: "title", widget: "string" }
              - { label: "Description", name: "desc", widget: "text" }
              - { label: "Tools (comma separated)", name: "tools", widget: "string" }
              - { label: "Fine Print / Note", name: "note", widget: "string" }

      - name: "pricing"
        label: "💰 Pricing Plans"
        file: "_data/pricing.json"
        fields:
          - label: "Plans"
            name: "plans"
            widget: "list"
            fields:
              - { label: "Plan Name", name: "name", widget: "string" }
              - { label: "Monthly Price (numbers only)", name: "price_monthly", widget: "number" }
              - { label: "Annual Price (numbers only)", name: "price_annual", widget: "number" }
              - { label: "Price Unit (e.g. one-time or /month)", name: "unit", widget: "string" }
              - { label: "Short Pitch", name: "pitch", widget: "string" }
              - { label: "Featured? (Most Popular badge)", name: "featured", widget: "boolean", default: false }
              - label: "Features"
                name: "features"
                widget: "list"
                field: { label: "Feature", name: "feature", widget: "string" }
              - { label: "Fine Print", name: "fine_print", widget: "string" }
              - { label: "Button Text", name: "btn", widget: "string", default: "Get Started" }

      - name: "consultations"
        label: "📅 Consultations"
        file: "_data/consultations.json"
        fields:
          - { label: "Section Heading", name: "heading", widget: "string" }
          - { label: "Section Subtext", name: "sub", widget: "string" }
          - label: "Options"
            name: "options"
            widget: "list"
            fields:
              - { label: "Name", name: "name", widget: "string" }
              - { label: "Price (numbers only)", name: "price", widget: "number" }
              - { label: "Description", name: "desc", widget: "text" }
              - { label: "Duration / Format", name: "meta", widget: "string" }
              - { label: "Best For (italic note)", name: "best_for", widget: "string" }

      - name: "testimonials"
        label: "⭐ Testimonials"
        file: "_data/testimonials.json"
        fields:
          - label: "Testimonials"
            name: "items"
            widget: "list"
            fields:
              - { label: "Quote", name: "quote", widget: "text" }
              - { label: "Name", name: "name", widget: "string" }
              - { label: "Business", name: "business", widget: "string" }
              - { label: "Initials (for avatar)", name: "initials", widget: "string" }

      - name: "faq"
        label: "❓ FAQ"
        file: "_data/faq.json"
        fields:
          - label: "Questions"
            name: "items"
            widget: "list"
            fields:
              - { label: "Question", name: "q", widget: "string" }
              - { label: "Answer", name: "a", widget: "text" }

      - name: "cta"
        label: "📣 CTA Section"
        file: "_data/cta.json"
        fields:
          - { label: "Headline", name: "heading", widget: "string", default: "Ready to get your business online — properly?" }
          - { label: "Subtext", name: "sub", widget: "string", default: "Start with the free audit. No commitment, no credit card, no pitch." }
          - { label: "Primary Button Text", name: "btn1", widget: "string", default: "Request Free Audit" }
          - { label: "Secondary Button Text", name: "btn2", widget: "string", default: "Book a Consultation" }

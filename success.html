<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8"/>
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>Request Received — Main Street Digital</title>
  <link href="https://fonts.googleapis.com/css2?family=Cormorant+Garamond:ital,wght@0,600;1,600&family=Jost:wght@300;400;600&display=swap" rel="stylesheet"/>
  <style>
    *{box-sizing:border-box;margin:0;padding:0;}
    body{font-family:'Jost',sans-serif;background:#faf9f8;color:#1a1a1a;min-height:100vh;display:flex;align-items:center;justify-content:center;text-align:center;padding:2rem;}
    .box{max-width:480px;}
    .icon{font-size:3rem;margin-bottom:1.5rem;}
    h1{font-family:'Cormorant Garamond',serif;font-size:2.5rem;font-weight:600;color:#3d2e4a;margin-bottom:1rem;line-height:1.1;}
    h1 em{font-style:italic;color:#7e6b95;}
    p{font-size:.95rem;color:#7a7a7a;line-height:1.8;margin-bottom:2rem;font-weight:300;}
    a{display:inline-block;background:#b8a9cc;color:#3d2e4a;padding:.8rem 2rem;border-radius:4px;font-family:'Jost',sans-serif;font-size:.82rem;font-weight:600;letter-spacing:.08em;text-transform:uppercase;text-decoration:none;}
    a:hover{background:#c9b8e0;}
  </style>
</head>
<body>
  <div class="box">
    <div class="icon">✨</div>
    <h1>Request <em>received!</em></h1>
    <p>Thank you for reaching out. Caroline will review your site and send your free audit within 48 business hours. Keep an eye on your inbox!</p>
    <a href="/">Back to Home</a>
  </div>
</body>
</html>
